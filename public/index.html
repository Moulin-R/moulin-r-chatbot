const shuffleArray = (arr) => {
  const shuffled = [...arr];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
};

const pickQuestions = (usedSet, count = 6) => {
  const available = ALL_QUESTIONS.filter((q) => !usedSet.has(q));
  if (available.length <= count) return shuffleArray(available);
  return shuffleArray(available).slice(0, count);
};

const RENA_AVATARS = [RENA_AVATAR_1, RENA_AVATAR_2];

const RenaAvatar = ({ size = 40 }) => {
  const [avatarIndex] = useState(() => Math.floor(Math.random() * RENA_AVATARS.length));
  return (
    <div style={{
      width: size,
      height: size,
      borderRadius: "50%",
      overflow: "hidden",
      flexShrink: 0,
      border: "1.5px solid rgba(212, 184, 150, 0.5)",
      boxShadow: "0 2px 6px rgba(160, 130, 100, 0.15)",
    }}>
      <img
        src={RENA_AVATARS[avatarIndex]}
        alt="Rena"
        style={{
          width: "100%",
          height: "100%",
          objectFit: "cover",
        }}
      />
    </div>
  );
};

function MoulinRChatbot() {
  const [messages, setMessages] = useState([INITIAL_MESSAGE]);
  const [input, setInput] = useState("");
  const [isLoading, setIsLoading] = useState(false);
  const [showQuickQ, setShowQuickQ] = useState(true);
  const [usedQuestions, setUsedQuestions] = useState(new Set());
  const [currentQuestions, setCurrentQuestions] = useState(() => pickQuestions(new Set(), 6));
  const messagesEndRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  const sendMessage = async (text) => {
    if (!text.trim() || isLoading) return;
    setShowQuickQ(false);
    const trimmed = text.trim();

    const newUsed = new Set(usedQuestions);
    newUsed.add(trimmed);
    setUsedQuestions(newUsed);

    const userMsg = { role: "user", content: trimmed };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput("");
    setIsLoading(true);

    try {
      const apiMessages = newMessages
        .filter((m) => m.role !== "system")
        .map((m) => ({
          role: m.role,
          content: m.content,
        }));

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: apiMessages,
        }),
      });
      const data = await res.json();
      const reply =
        data.content
          ?.filter((b) => b.type === "text")
          .map((b) => b.text)
          .join("\n") || "申し訳ございません、うまく応答できませんでした。";

      setMessages((prev) => [...prev, { role: "assistant", content: reply }]);
      setCurrentQuestions(pickQuestions(newUsed, 6));
      setShowQuickQ(true);
    } catch (e) {
      setMessages((prev) => [
        ...prev,
        {
          role: "assistant",
          content:
            "申し訳ございません、通信がうまくいきませんでした。\nもう一度お試しくださいね。",
        },
      ]);
      setCurrentQuestions(pickQuestions(newUsed, 6));
      setShowQuickQ(true);
    }
    setIsLoading(false);
  };

  const handleKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage(input);
    }
  };

  const renderContent = (text) => {
    const parts = text.split("\n");
    return parts.map((line, i) => (
      <span key={i}>
        {line}
        {i < parts.length - 1 && <br />}
      </span>
    ));
  };

  const renderBotContent = (text) => {
    const parts = text.split("\n");
    return (
      <span style={styles.botBubbleText}>
        <span style={{ display: "inline-flex", alignItems: "center", gap: "8px" }}>
          <RenaAvatar size={42} />
          <span>{parts[0]}</span>
        </span>
        {parts.length > 1 && <br />}
        {parts.slice(1).map((line, i) => (
          <span key={i}>
            {line}
            {i < parts.length - 2 && <br />}
          </span>
        ))}
      </span>
    );
  };

  const messageCount = messages.filter((m) => m.role === "user").length;
  const showBooking = messageCount >= 2;

  return (
    <div style={styles.wrapper}>
      <div style={styles.container}>
        {/* Header */}
        <div style={styles.header}>
          <div style={styles.headerInner}>
            <div style={styles.logoArea}>
              <div style={styles.logoCircle}>
                <span style={styles.logoText}>MR</span>
              </div>
              <div>
                <div style={styles.salonName}>Moulin-R</div>
                <div style={styles.salonSub}>Beauty Counselor — Rena</div>
              </div>
            </div>
            <div style={styles.statusDot}>
              <span style={styles.dot}></span>
              <span style={styles.statusText}>Online</span>
            </div>
          </div>
        </div>

        {/* Messages */}
        <div style={styles.messagesArea}>
          <div style={styles.dateLabel}>今日</div>

          {messages.map((msg, idx) => (
            <div
              key={idx}
              style={
                msg.role === "user" ? styles.userBubbleRow : styles.botBubbleRow
              }
            >
              <div
                style={
                  msg.role === "user" ? styles.userBubble : styles.botBubble
                }
              >
                {msg.role === "user" ? (
                  <span style={styles.userBubbleText}>
                    {renderContent(msg.content)}
                  </span>
                ) : (
                  renderBotContent(msg.content)
                )}
              </div>
            </div>
          ))}

          {isLoading && (
            <div style={styles.botBubbleRow}>
              <div style={styles.botBubble}>
                <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                  <RenaAvatar size={42} />
                  <div style={styles.typing}>
                    <span style={styles.typingDot1}></span>
                    <span style={styles.typingDot2}></span>
                    <span style={styles.typingDot3}></span>
                  </div>
                </div>
              </div>
            </div>
          )}

          {showQuickQ && !isLoading && currentQuestions.length > 0 && (
            <div style={styles.quickQWrap} key={currentQuestions.join(",")}>
              <div style={styles.quickQLabel}>
                他にも気になることがあればタップしてください ♪
              </div>
              <div style={styles.quickQGrid}>
                {currentQuestions.map((q, i) => (
                  <button
                    key={q}
                    style={styles.quickQBtn}
                    onClick={() => sendMessage(q)}
                    onMouseEnter={(e) =>
                      (e.target.style.background =
                        "linear-gradient(135deg, #c9a87c 0%, #b8956a 100%)")
                    }
                    onMouseLeave={(e) =>
                      (e.target.style.background =
                        "linear-gradient(135deg, #d4b896 0%, #c9a87c 100%)")
                    }
                  >
                    {q}
                  </button>
                ))}
              </div>
              <div style={styles.quickQBooking}>
                <a
                  href="http://1cs.jp/mr/x"
                  target="_blank"
                  rel="noopener noreferrer"
                  style={styles.quickQBookingLink}
                  onMouseEnter={(e) =>
                    (e.target.style.transform = "translateY(-1px)")
                  }
                  onMouseLeave={(e) =>
                    (e.target.style.transform = "translateY(0)")
                  }
                >
                  ネット予約はこちら ♪
                </a>
              </div>
            </div>
          )}

          {showBooking && (
            <div style={styles.bookingBanner}>
              <div style={styles.bookingInner}>
                <div style={styles.bookingText}>
                  ✨ あなたに合ったケアをご提案いたします
                </div>
                <a
                  href={BOOKING_URL}
                  target="_blank"
                  rel="noopener noreferrer"
                  style={styles.bookingBtn}
                  onMouseEnter={(e) =>
                    (e.target.style.transform = "translateY(-1px)")
                  }
                  onMouseLeave={(e) =>
                    (e.target.style.transform = "translateY(0)")
                  }
                >
                  ネット予約はこちら ♪
                </a>
              </div>
            </div>
          )}

          <div ref={messagesEndRef} />
        </div>

        {/* Input */}
        <div style={styles.inputArea}>
          <div style={styles.inputRow}>
            <textarea
              ref={inputRef}
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={handleKeyDown}
              placeholder="お悩みやご質問をどうぞ…"
              style={styles.textarea}
              rows={1}
            />
            <button
              onClick={() => sendMessage(input)}
              disabled={isLoading || !input.trim()}
              style={{
                ...styles.sendBtn,
                opacity: isLoading || !input.trim() ? 0.4 : 1,
              }}
            >
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path
                  d="M22 2L11 13"
                  stroke="white"
                  strokeWidth="2"
                  strokeLinecap="round"
                  strokeLinejoin="round"
                />
                <path
                  d="M22 2L15 22L11 13L2 9L22 2Z"
                  stroke="white"
                  strokeWidth="2"
                  strokeLinecap="round"
                  strokeLinejoin="round"
                />
              </svg>
            </button>
          </div>
          <div style={styles.footerNote}>
            Moulin-R Beauty Counselor powered by AI
          </div>
        </div>
      </div>

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500&display=swap');
        
        @keyframes fadeInUp {
          from { opacity: 0; transform: translateY(12px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
          0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
          40% { transform: scale(1); opacity: 1; }
        }
        @keyframes shimmer {
          0% { background-position: -200% center; }
          100% { background-position: 200% center; }
        }
        @keyframes gentleFloat {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-3px); }
        }
        textarea::placeholder {
          color: #b8a898;
          font-family: 'Noto Sans JP', sans-serif;
          font-weight: 300;
        }
        textarea:focus {
          outline: none;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4c4b0; border-radius: 2px; }
      `}</style>
    </div>
  );
}
